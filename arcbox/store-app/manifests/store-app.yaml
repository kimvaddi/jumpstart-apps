apiVersion: v1
kind: Namespace
metadata:
  name: store-app
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: store-app
  namespace: store-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: store-app
  template:
    metadata:
      labels:
        app: store-app
    spec:
      containers:
        - name: store-app
          image: ghcr.io/kimvaddi/store-app:c4632be
          ports:
            - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: store-app
  namespace: store-app
spec:
  selector:
    app: store-app
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: store-app
  namespace: store-app
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: store.devops.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: store-app
                port:
                  number: 80