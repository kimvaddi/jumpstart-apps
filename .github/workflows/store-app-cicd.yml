name: store-app CI/CD
on:
  push:
    branches: [ main ]
    paths:
      - 'arcbox/store-app/src/**'

permissions:
  contents: write
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tag
        id: tag
        run: echo "tag=$(echo ${{ github.sha }} | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: ./arcbox/store-app/src
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/store-app:${{ steps.tag.outputs.tag }}
            ghcr.io/${{ github.repository_owner }}/store-app:latest

      - name: Bump image tag in manifest
        run: |
          NEW_IMAGE="ghcr.io/${{ github.repository_owner }}/store-app:${{ steps.tag.outputs.tag }}"
          sed -i "s|image: ghcr.io/${{ github.repository_owner }}/store-app:.*|image: $NEW_IMAGE|" arcbox/store-app/manifests/store-app.yaml

          if git diff --quiet arcbox/store-app/manifests/store-app.yaml; then
            echo "No manifest change - skipping commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add arcbox/store-app/manifests/store-app.yaml
          git commit -m "deploy: bump store-app to ${{ steps.tag.outputs.tag }}"
          git push